name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test:coverage

      - uses: codecov/codecov-action@v7
        with:
          files: ./packages/rosetta-date/coverage/lcov.info
          fail_ci_if_error: true
          use_oidc: true

      - run: pnpm build

      - run: pnpm playground:build

      - run: pnpm docs:build
