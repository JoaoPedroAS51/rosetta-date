allowBuilds:
  sharp: true

# Keep new deps flowing into the catalog and prune entries no package references.
catalogMode: prefer
cleanupUnusedCatalogs: true

packages:
  - packages/*
  - playground
  - docs

overrides:
  zod: 4.1.12

catalog:
  '@antfu/eslint-config': ^9.0.0
  '@changesets/cli': ^2.31.0
  '@types/node': ^25.9.2
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.0
  '@vitest/coverage-v8': ^4.1.8
  eslint: ^10.4.1
  eslint-plugin-markdown-preferences: ^0.41.1
  next: ^16.2.9
  nextra: ^4.6.1
  nextra-theme-docs: ^4.6.1
  react: ^19.2.0
  react-dom: ^19.2.0
  tsdown: ^0.22.2
  typescript: ^6.0.3
  vite: ^8.0.16
  vitest: ^4.1.8
